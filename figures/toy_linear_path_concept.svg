<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">2D toy linear path concept</title>
  <desc id="desc">A conceptual diagram showing source Gaussian samples, target eight Gaussian modes, and linear paths between paired samples.</desc>
  <rect width="960" height="360" fill="#ffffff"/>
  <style>
    .panel { fill: #fbfbfc; stroke: #d7dbe3; stroke-width: 1.5; rx: 8; }
    .axis { stroke: #c5cad3; stroke-width: 1; }
    .source { fill: #3d6fb6; fill-opacity: 0.68; }
    .target { fill: #d45b48; fill-opacity: 0.78; }
    .path { stroke: #56606f; stroke-opacity: 0.45; stroke-width: 1.4; }
    .mid { fill: #46a36f; fill-opacity: 0.76; }
    .label { fill: #1f2530; font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; }
    .small { fill: #4c5565; font-family: Arial, sans-serif; font-size: 13px; }
    .formula { fill: #1f2530; font-family: Arial, sans-serif; font-size: 16px; }
  </style>

